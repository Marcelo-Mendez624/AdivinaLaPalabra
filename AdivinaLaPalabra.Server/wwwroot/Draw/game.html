<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina la palabra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="zonaDibujo">
            <div class="tools">
                <label for="colorPicker">Color: </label>
                <input type="color" id="colorPicker" value="#000000">

                <label for="brushSize">Grosor: </label>
                <input type="range" id="brushSize" min="1" max="10" value="2">
                
                <button id="clearCanvas">Borrar todo</button>
                <p>PIN: <span id="pinValue">0000</span></p>
                <p>Jugador: <span id="playerTurn">Anónimo</span></p>
            </div>

            <h2 id="currentWordDisplay"></h2>

            <Canvas id="gameCanvas"></Canvas>

        </div>
        
        <div class="chat">

            <ul id="messagesList"></ul>

            <div class="message">
                <input type="text" id="messageInput" placeholder="Your message">
                <button id="sendButton">Send</button>
            </div>
            

              
        </div>
        
    </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="gameManager.js"></script> 
</body>
</html>
